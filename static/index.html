<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanIQ</title>
    <meta name="description" content="Smart file management with AI-powered analysis to help you reclaim storage space">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="/static/logo.png" alt="CleanIQ Logo" class="logo-icon-img"
                        style="width: 70px; height: 90px;">
                    <span class="logo-text">CleanIQ</span>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="control-group">
                    <label class="control-label">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                        AI Model
                    </label>
                    <select id="modelSelect" class="select-input">
                        <option value="">Loading models...</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        Scan Mode
                    </label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-mode="fast">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                            </svg>
                            Fast
                        </button>
                        <button class="toggle-btn" data-mode="advance">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </svg>
                            Advanced
                        </button>
                    </div>
                </div>

                <div class="control-group" id="pathGroup" style="display: none;">
                    <label class="control-label">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                        </svg>
                        Scan Path
                    </label>
                    <input type="text" id="pathInput" class="text-input" placeholder="C:\Users\..." value="">
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeSystem" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Exclude system files</span>
                    </label>
                </div>

                <button id="scanBtn" class="primary-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    Start Scan
                </button>

                <div class="stats-panel" id="statsPanel" style="display: none;">
                    <div class="stat-item">
                        <span class="stat-value" id="fileCount">0</span>
                        <span class="stat-label">Files Found</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="totalSize">0 MB</span>
                        <span class="stat-label">Total Size</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <p class="footer-text">Powered by Ollama</p>
                <div class="footer-attribution">
                    Made by <a href="https://github.com/ThisisOmar-here" target="_blank"
                        class="attribution-link">ThisisOmar-here</a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-top">
                    <div class="header-text">
                        <h1 class="page-title">CleanIQ</h1>
                        <p class="page-subtitle" id="statusText">Select a scan mode and click Start Scan</p>
                    </div>
                    <div class="filter-control" id="filterControl" style="display: none;">
                        <button id="safeFilterBtn" class="filter-btn"
                            title="Show only cache, temp, and log files that are safe to delete">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            </svg>
                            Safe to Delete Only
                        </button>
                        <span class="filter-info"
                            title="Filters to show only cache, temp, logs, and other safe-to-delete files. Hides documents, photos, videos, and code.">ⓘ</span>
                    </div>
                    <div class="sort-control" id="sortControl" style="display: none;">
                        <label class="sort-label">Sort by:</label>
                        <select id="sortSelect" class="sort-select">
                            <option value="size-desc">Size (Largest)</option>
                            <option value="size-asc">Size (Smallest)</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="date-desc">Modified (Newest)</option>
                            <option value="date-asc">Modified (Oldest)</option>
                        </select>
                    </div>
                </div>
            </header>

            <div class="file-grid" id="fileGrid">
                <div class="empty-state" id="emptyState">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                        <polyline points="13 2 13 9 20 9" />
                    </svg>
                    <h3>No files scanned yet</h3>
                    <p>Start a scan to discover large files on your system</p>
                </div>
            </div>

            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="spinner"></div>
                <p id="loadingText">Scanning files...</p>
            </div>
        </main>

        <!-- Detail Panel -->
        <aside class="detail-panel" id="detailPanel">
            <div class="panel-header">
                <h2 class="panel-title">File Details</h2>
                <button class="close-btn" id="closePanel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="panel-content" id="panelContent">
            </div>
        </aside>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
